<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF417 - 2D Barcode Generator</title>

    <style>
        :root {
            --bg: #f8f9fa;
            --fg: #1a1a1a;
            --card-bg: #fff;
            --border: #ccc;
            --border-light: #dee2e6;
            --btn-bg: #fff;
            --btn-hover-bg: #e9ecef;
            --btn-hover-border: #adb5bd;
            --primary: #228be6;
            --primary-hover: #1971c2;
            --hint: #868e96;
            --textarea-bg: #fff;
            --barcode-fg: #000;
            --barcode-bg: #fff;
        }
        [data-theme="dark"] {
            --bg: #1a1b1e;
            --fg: #c9cdd1;
            --card-bg: #25262b;
            --border: #464a4f;
            --border-light: #373a40;
            --btn-bg: #2c2e33;
            --btn-hover-bg: #373a40;
            --btn-hover-border: #5c5f66;
            --primary: #339af0;
            --primary-hover: #228be6;
            --hint: #909296;
            --textarea-bg: #25262b;
            --barcode-fg: #c9cdd1;
            --barcode-bg: #25262b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 24px 16px;
            color: var(--fg);
            background: var(--bg);
            transition: color 0.2s, background 0.2s;
        }
        h1 { font-size: 1.5rem; margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; }
        textarea {
            width: 100%;
            height: 180px;
            padding: 10px;
            font-family: monospace;
            font-size: 0.9rem;
            color: var(--fg);
            background: var(--textarea-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            resize: vertical;
            transition: color 0.2s, background 0.2s, border-color 0.2s;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 16px 0;
            align-items: center;
        }
        button {
            padding: 8px 18px;
            font-size: 0.9rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--btn-bg);
            color: var(--fg);
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }
        button:hover { background: var(--btn-hover-bg); border-color: var(--btn-hover-border); }
        button.primary {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        button.primary:hover { background: var(--primary-hover); }
        .save-group {
            display: flex;
            gap: 6px;
            margin-left: auto;
        }
        .save-group button { font-size: 0.82rem; padding: 7px 14px; }
        #barcode {
            margin: 16px 0;
            padding: 16px;
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 6px;
            text-align: center;
            min-height: 60px;
            transition: background 0.2s, border-color 0.2s;
        }
        .hint {
            font-size: 0.82rem;
            color: var(--hint);
            margin-top: 8px;
        }
        .hint a { color: var(--primary); }
        .theme-toggle {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 10px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .theme-toggle svg { width: 18px; height: 18px; fill: var(--fg); transition: fill 0.2s; }
        .theme-toggle:hover { background: var(--btn-hover-bg); border-color: var(--btn-hover-border); }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 { margin-bottom: 0; }

        #barcode canvas {
            max-width: 100%;
            height: auto;
        }

        @media (max-width: 600px) {
            body { padding: 16px 12px; }
            h1 { font-size: 1.2rem; }
            textarea { height: 140px; font-size: 16px; }
            .toolbar {
                flex-direction: column;
                gap: 10px;
            }
            .toolbar button {
                width: 100%;
                padding: 12px 18px;
                font-size: 1rem;
                min-height: 44px;
            }
            .save-group {
                margin-left: 0;
                width: 100%;
            }
            .save-group button {
                flex: 1;
                padding: 12px 10px;
                font-size: 0.9rem;
                min-height: 44px;
            }
            #barcode { padding: 12px; overflow-x: auto; }
            .theme-toggle { min-width: 44px; min-height: 44px; }
        }

        @media (max-width: 380px) {
            body { padding: 12px 8px; }
            h1 { font-size: 1.05rem; }
            .save-group { flex-direction: column; }
            .save-group button { width: 100%; }
        }
    </style>

    <script src="bcmath-min.js"></script>
    <script src="pdf417-min.js"></script>

    <script>
        var currentBarcode = null;

        function getScale() {
            var container = document.getElementById('barcode');
            if (!container || !currentBarcode) return { bw: 2, bh: 2 };
            var available = container.clientWidth - 32;
            var cols = currentBarcode['num_cols'];
            var bw = Math.max(1, Math.floor(available / cols));
            bw = Math.min(bw, 3);
            return { bw: bw, bh: bw };
        }

        function isDark() {
            return document.documentElement.getAttribute('data-theme') === 'dark';
        }

        var ICON_SUN = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/><style>path{stroke:currentColor;stroke-width:2;stroke-linecap:round;fill:none}circle{fill:currentColor}</style></svg>';
        var ICON_MOON = '<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" fill="currentColor"/></svg>';

        function applyTheme(dark) {
            document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
            var btn = document.querySelector('.theme-toggle');
            if (btn) btn.innerHTML = dark ? ICON_SUN : ICON_MOON;
            if (currentBarcode) renderToCanvas(currentBarcode);
        }

        function toggleTheme() {
            var dark = !isDark();
            applyTheme(dark);
            try { localStorage.setItem('pdf417-theme', dark ? 'dark' : 'light'); } catch(e) {}
        }

        function getPreferredTheme() {
            var saved = null;
            try { saved = localStorage.getItem('pdf417-theme'); } catch(e) {}
            if (saved) return saved === 'dark';
            return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        }

        document.documentElement.setAttribute('data-theme', getPreferredTheme() ? 'dark' : 'light');

        function getBarcodeFg() {
            return getComputedStyle(document.documentElement).getPropertyValue('--barcode-fg').trim() || '#000';
        }

        function renderToCanvas(barcode) {
            var container = document.getElementById('barcode');
            container.innerHTML = '';

            var scale = getScale();
            var bw = scale.bw, bh = scale.bh;

            var canvas = document.createElement('canvas');
            canvas.width = bw * barcode['num_cols'];
            canvas.height = bh * barcode['num_rows'];
            container.appendChild(canvas);

            var ctx = canvas.getContext('2d');
            ctx.fillStyle = getBarcodeFg();
            var y = 0;
            for (var r = 0; r < barcode['num_rows']; ++r) {
                var x = 0;
                for (var c = 0; c < barcode['num_cols']; ++c) {
                    if (barcode['bcode'][r][c] == 1) {
                        ctx.fillRect(x, y, bw, bh);
                    }
                    x += bw;
                }
                y += bh;
            }
            return canvas;
        }

        function generate() {
            var text = document.getElementById('textToEncode').value;
            if (!text) return;

            PDF417.init(text);
            currentBarcode = PDF417.getBarcodeArray();
            renderToCanvas(currentBarcode);
        }

        /* ---------- Save as PNG ---------- */
        function savePNG() {
            if (!currentBarcode) { alert('Please generate a barcode first.'); return; }
            var canvas = document.querySelector('#barcode canvas');
            if (!canvas) return;

            var link = document.createElement('a');
            link.download = 'pdf417-barcode.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        /* ---------- Save as SVG ---------- */
        function buildSVG(barcode) {
            var bw = 2, bh = 2;
            var w = bw * barcode['num_cols'];
            var h = bh * barcode['num_rows'];
            var rects = [];

            for (var r = 0; r < barcode['num_rows']; ++r) {
                var run_start = -1;
                for (var c = 0; c <= barcode['num_cols']; ++c) {
                    var filled = (c < barcode['num_cols'] && barcode['bcode'][r][c] == 1);
                    if (filled && run_start < 0) {
                        run_start = c;
                    } else if (!filled && run_start >= 0) {
                        rects.push('<rect x="' + (run_start * bw) + '" y="' + (r * bh) +
                            '" width="' + ((c - run_start) * bw) + '" height="' + bh + '"/>');
                        run_start = -1;
                    }
                }
            }

            return '<?xml version="1.0" encoding="UTF-8"?>\n' +
                '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h +
                '" viewBox="0 0 ' + w + ' ' + h + '">\n' +
                '<rect width="100%" height="100%" fill="#fff"/>\n' +
                '<g fill="#000">\n' + rects.join('\n') + '\n</g>\n</svg>';
        }

        function saveSVG() {
            if (!currentBarcode) { alert('Please generate a barcode first.'); return; }
            var svg = buildSVG(currentBarcode);
            downloadText(svg, 'pdf417-barcode.svg', 'image/svg+xml');
        }

        /* ---------- Save as HTML ---------- */
        function saveHTML() {
            if (!currentBarcode) { alert('Please generate a barcode first.'); return; }
            var svg = buildSVG(currentBarcode);
            var html = '<!DOCTYPE html>\n<html lang="en">\n<head>\n' +
                '<meta charset="utf-8"/>\n' +
                '<title>PDF417 Barcode</title>\n' +
                '<style>body{display:flex;justify-content:center;align-items:center;' +
                'min-height:100vh;margin:0;background:#f8f9fa}</style>\n' +
                '</head>\n<body>\n' + svg + '\n</body>\n</html>';
            downloadText(html, 'pdf417-barcode.html', 'text/html');
        }

        /* ---------- Helper ---------- */
        function downloadText(content, filename, mime) {
            var blob = new Blob([content], { type: mime + ';charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var link = document.createElement('a');
            link.download = filename;
            link.href = url;
            link.click();
            setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
        }

        var resizeTimer;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(function() {
                if (currentBarcode) renderToCanvas(currentBarcode);
            }, 150);
        });

        window.onload = function() {
            applyTheme(getPreferredTheme());

            if (window.matchMedia) {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                    var saved = null;
                    try { saved = localStorage.getItem('pdf417-theme'); } catch(ex) {}
                    if (!saved) applyTheme(e.matches);
                });
            }

            var hub3_code = "HRVHUB30\nHRK\n" +
                "000000000012355\n" +
                "ZELJKO SENEKOVIC\n" +
                "IVANECKA ULICA 125\n" +
                "42000 VARAZDIN\n" +
                "2DBK d.d.\n" +
                "ALKARSKI PROLAZ 13B\n" +
                "21230 SINJ\n" +
                "HR1210010051863000160\n" +
                "HR01\n" +
                "7269-68949637676-00019\n" +
                "COST\n" +
                "Troskovi za 1. mjesec\n";

            document.getElementById('textToEncode').value = hub3_code;
            generate();
        };
    </script>
</head>
<body>
    <div class="header">
        <h1>PDF417 - 2D Barcode Generator</h1>
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode" aria-label="Toggle dark mode"></button>
    </div>

    <label for="textToEncode">Text to encode</label>
    <textarea id="textToEncode"></textarea>

    <div class="toolbar">
        <button class="primary" onclick="generate()">Generate</button>
        <div class="save-group">
            <button onclick="savePNG()">Save PNG</button>
            <button onclick="saveSVG()">Save SVG</button>
            <button onclick="saveHTML()">Save HTML</button>
        </div>
    </div>

    <div id="barcode"></div>

    <p class="hint">
        Test using your mobile phone barcode scanner, or decode online at
        <a href="https://zxing.org/w/decode.jspx">zxing.org</a>.
    </p>
</body>
</html>
